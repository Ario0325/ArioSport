{% extends "shared/base.html" %}
{% load static %}
{% block title %}تغییر رمز عبور | {{ site.site_name }}{% endblock %}
{% block content %}
<section class="page-hero"><div class="container"><h1 data-reveal>تغییر رمز عبور</h1>
  <div class="breadcrumb" data-reveal data-delay="1"><a href="{% url 'accounts:dashboard' %}">داشبورد</a> <i data-lucide="chevron-left"></i> <span>تغییر رمز</span></div></div></section>
<section class="section" style="padding-top:40px;">
  <div class="container" style="max-width:520px;">
    <div class="auth-card" style="margin:0;">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--primary-1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <i data-lucide="shield-check" style="width:28px;height:28px;color:#fff;"></i>
        </div>
        <h3 style="margin-bottom:8px;">تایید هویت</h3>
        <p style="color:var(--muted);font-size:.9rem;">برای امنیت حساب شما، ابتدا یک کد تایید به ایمیلتان ارسال می‌شود.</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary btn-block btn-lg"><i data-lucide="send"></i> ارسال کد تایید</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}

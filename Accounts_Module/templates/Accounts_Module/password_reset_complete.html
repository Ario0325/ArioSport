{% extends "shared/auth_base.html" %}
{% load static %}
{% block title %}رمز تغییر کرد | {{ site.site_name }}{% endblock %}
{% block content %}
<main class="auth single">
  <section class="auth-form-wrap" style="grid-column:1/-1;">
    <div class="auth-card">
      <a href="{% url 'home:index' %}" class="logo" style="justify-content:center; margin-bottom:18px;"><img src="{% static 'assets/images/logo-mark.png' %}" alt="" /><span class="logo-txt">Ario<b>Sport</b></span></a>
      <h1>رمز عبور تغییر کرد</h1>
      <p class="sub">رمز عبور شما با موفقیت تغییر کرد. اکنون می‌توانید وارد شوید.</p>
      <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-block btn-lg"><i data-lucide="log-in"></i> ورود به حساب</a>
    </div>
  </section>
</main>
{% endblock %}

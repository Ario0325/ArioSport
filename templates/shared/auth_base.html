{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ site.site_name }}{% endblock %}</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="{% static 'assets/images/favicon.png' %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}" />
</head>
<body>
  {% if messages %}<div class="flash-stack">{% for m in messages %}<div class="flash flash-{{ m.tags }}"><i data-lucide="info"></i><span>{{ m }}</span><button class="flash-x">&times;</button></div>{% endfor %}</div>{% endif %}
  {% block content %}{% endblock %}
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="{% static 'assets/js/main.js' %}"></script>
</body>
</html>
